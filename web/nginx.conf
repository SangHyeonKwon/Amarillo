server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — client-side routes (/pools, /failed-tx, …) resolve to
    # index.html so deep links and refreshes work.
    #
    # If `VITE_APP_BASE_PATH` is set to a subpath (e.g. /dash), configure your
    # edge/reverse proxy to strip that prefix before forwarding to this nginx.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
